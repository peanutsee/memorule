name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/memorule/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Verify version matches release tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          pyproject_version="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          if [ "$version" != "$pyproject_version" ]; then
            echo "Release tag version ($version) does not match pyproject.toml ($pyproject_version)"
            exit 1
          fi

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish
